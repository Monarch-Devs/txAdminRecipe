$engine: 3
$onesync: on

name: Monarch Framework
description: Recipe for Monarch Framework installation and setup
author: IlMelons
version: 0.0.1

tasks:
  ## Default Cfx Resources
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    ref: master
    subpath: resources
    dest: ./resources/[cfx]

  ## Cleaning unnecessary things
  - action: remove_path
    path: ./resources/[cfx]/[gamemodes]/[maps]/redm-map-one

  - action: remove_path
    path: ./resources/[cfx]/[gameplay]/[examples]

  - action: remove_path
    path: ./resources/[cfx]/[gameplay]/chat

  - action: remove_path
    path: ./resources/[cfx]/[local]

  - action: remove_path
    path: ./resources/[cfx]/[system]/hardcap

  - action: remove_path
    path: ./resources/[cfx]/[system]/sessionmanager-rdr3

  - action: remove_path
    path: ./resources/[cfx]/[test]

  ## Base Setup
  - action: download_file
    url: https://raw.githubusercontent.com/Monarch-Devs/txAdminRecipe/refs/heads/main/mnrLogo.png
    path: ./mnrLogo.png

  - action: download_file
    url: https://raw.githubusercontent.com/Monarch-Devs/txAdminRecipe/refs/heads/main/cfg/server.cfg
    path: ./server.cfg

  ## Monarch Resources (Not definitive)
  - action: download_github
    src: https://github.com/Monarch-Devs/mnr_adaptivecard
    ref: main
    dest: ./resources/[mnr]/mnr_adaptivecard

  - action: download_github
    src: https://github.com/Monarch-Devs/mnr_core
    ref: main
    dest: ./resources/[mnr]/mnr_core

  - action: connect_database

  - action: query_database
    file: ./resources/[mnr]/mnr_core/mnr_core.sql

  ## Ox Resources [DOWNLOAD]
  - action: download_file
    path: ./installation/oxmysql.zip
    url: https://github.com/communityox/oxmysql/releases/latest/download/oxmysql.zip

  - action: download_file
    path: ./installation/ox_lib.zip
    url: https://github.com/communityox/ox_lib/releases/latest/download/ox_lib.zip

  - action: download_file
    path: ./installation/ox_target.zip
    url: https://github.com/communityox/ox_target/releases/latest/download/ox_target.zip

  - action: download_file
    path: ./installation/ox_inventory.zip
    url: https://github.com/communityox/ox_inventory/releases/latest/download/ox_inventory.zip

  - action: download_file
    path: ./installation/ox_doorlock.zip
    url: https://github.com/communityox/ox_doorlock/releases/latest/download/ox_doorlock.zip

  ## Ox Resources [UNZIP & MOVE]
  - action: unzip
    dest: ./resources/[ox]
    src: ./installation/oxmysql.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./installation/ox_lib.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./installation/ox_target.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./installation/ox_inventory.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./installation/ox_doorlock.zip

  ## Cleaning Installation Leftovers
  - action: remove_path
    path: ./installation