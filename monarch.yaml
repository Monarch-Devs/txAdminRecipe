$engine: 3
$onesync: on

name: Monarch Framework
description: Recipe for Monarch Framework installation and setup
author: IlMelons
version: 0.0.1

tasks:
  ## Base Setup
  - action: download_file
    url: https://raw.githubusercontent.com/Monarch-Devs/txAdminRecipe/refs/heads/main/mnrLogo.png
    path: ./mnrLogo.png

  - action: download_file
    url: https://raw.githubusercontent.com/Monarch-Devs/txAdminRecipe/refs/heads/main/cfg/server.cfg
    path: ./server.cfg

  - action: download_file
    url: https://raw.githubusercontent.com/Monarch-Devs/txAdminRecipe/refs/heads/main/cfg/mnr.cfg
    path: ./mnr.cfg

  ## SQL/API
  - action: download_file
    path: ./installation/mnr_sql.zip
    url: https://github.com/Monarch-Devs/mnr_sql/releases/latest/download/mnr_sql.zip

  - action: download_file
    path: ./installation/mnr_api.zip
    url: https://github.com/Monarch-Devs/mnr_api/releases/latest/download/mnr_api.zip

  ## EXTRAS FRAMEWORK
  - action: download_github
    src: https://github.com/Monarch-Devs/mnr_adaptivecards
    ref: main
    dest: ./resources/[mnr]/mnr_adaptivecards

  - action: download_github
    src: https://github.com/Monarch-Devs/mnr_discordpresence
    ref: main
    dest: ./resources/[mnr]/mnr_discordpresence

  ## FRAMEWORK
  - action: download_github
    src: https://github.com/Monarch-Devs/mnr_core
    ref: main
    dest: ./resources/[mnr]/mnr_core

  ## [UNZIP & MOVE]
  - action: unzip
    dest: ./resources/[mnr]
    src: ./installation/mnr_sql.zip

  - action: unzip
    dest: ./resources/[mnr]
    src: ./installation/mnr_api.zip

  ## DATABASE ACTIONS
  - action: connect_database

  - action: query_database
    file: ./resources/[mnr]/mnr_core/mnr_core.sql

  ## Cleaning Installation Leftovers
  - action: remove_path
    path: ./installation